<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Tugas — Akademi Digital Bandung</title>
  <meta name="description" content="Portal pengumpulan tugas Akademi Digital Bandung dengan pemeriksaan kemiripan.">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="top">
    <div class="wrap">
      <h1><a href="./">Portal Tugas ADB</a></h1>
      <p>Akademi Digital Bandung — pengumpulan tugas &amp; pemeriksaan kemiripan</p>
    </div>
  </header>

  <div class="wrap">
    <nav class="tabs">
      <a href="./" class="aktif">Daftar Tugas</a>
      <a href="dosen.html">Halaman Dosen</a>
    </nav>

    <div id="isi"><p class="redup">Memuat daftar tugas…</p></div>
  </div>

  <footer>
    <p><span id="status-backend"><span class="status-dot gagal"></span>memeriksa backend…</span>
    · <a href="#" id="ganti-backend">alamat backend</a></p>
    <p>Skor kemiripan adalah alat bantu, bukan vonis plagiat; keputusan pada dosen.</p>
  </footer>

  <script type="module">
    import { apiGet, gantiAlamatBackend } from './assets/js/api.js';
    import { API_BASE } from './assets/js/config.js';

    document.getElementById('ganti-backend').onclick = (e) => { e.preventDefault(); gantiAlamatBackend(); };

    const isi = document.getElementById('isi');
    const status = document.getElementById('status-backend');
    try {
      const h = await apiGet('/health');
      status.innerHTML = `<span class="status-dot ok"></span>backend tersambung (${API_BASE})`;
      const { tugas } = await apiGet('/api/tugas');
      if (!tugas.length) {
        isi.innerHTML = '<div class="kartu"><h3>Belum ada tugas</h3>' +
          '<p class="meta">Dosen dapat membuat tugas lewat Halaman Dosen.</p></div>';
      } else {
        isi.innerHTML = tugas.map(t =>
          `<a class="kartu" href="tugas.html?id=${t.id}">
             <h3>${esc(t.judul)}</h3>
             <p class="meta">${t.n_kiriman} kiriman · klik untuk mengumpulkan jawaban</p>
           </a>`).join('');
      }
    } catch (err) {
      status.innerHTML = `<span class="status-dot gagal"></span>backend tidak terjangkau (${API_BASE})`;
      isi.innerHTML = `<div class="pesan gagal">Tidak bisa memuat daftar tugas: ${esc(err.message)}.<br>
        Pastikan backend jalan, atau ganti <a href="#" onclick="return false" id="gb2">alamat backend</a>.</div>`;
      document.getElementById('gb2').onclick = () => gantiAlamatBackend();
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
  </script>
</body>
</html>
