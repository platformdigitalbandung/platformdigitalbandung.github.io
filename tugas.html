<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirim Jawaban — Portal Tugas ADB</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="top">
    <div class="wrap">
      <h1><a href="./">Portal Tugas ADB</a></h1>
      <p>Kirim jawaban tugas</p>
    </div>
  </header>

  <div class="wrap">
    <nav class="tabs">
      <a href="./">Daftar Tugas</a>
      <a href="dosen.html">Halaman Dosen</a>
    </nav>
    <div id="isi"><p class="redup">Memuat tugas…</p></div>
  </div>

  <footer>
    <p>Berkas yang diterima: .txt, .docx, .pdf (maksimal 5 MB).</p>
  </footer>

  <script type="module">
    import { apiGet, apiPostForm } from './assets/js/api.js';

    const id = new URLSearchParams(location.search).get('id');
    const isi = document.getElementById('isi');

    function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

    try {
      if (!id) throw new Error('ID tugas tidak ada di URL');
      const t = await apiGet(`/api/tugas/${id}`);
      isi.innerHTML = `
        <div class="kartu">
          <h3>${esc(t.judul)}</h3>
          <p>${esc(t.deskripsi) || '<span class="redup">Tanpa deskripsi.</span>'}</p>
        </div>
        <div class="kartu">
          <h3>Kirim Jawaban</h3>
          <form id="form">
            <label>Nama lengkap<input name="nama" required maxlength="120"></label>
            <label>NIM<input name="nim" required maxlength="40"></label>
            <label>Berkas jawaban
              <input type="file" name="berkas" required accept=".txt,.docx,.pdf"></label>
            <button id="kirim">Unggah Jawaban</button>
          </form>
          <div id="hasil"></div>
        </div>`;

      document.getElementById('form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('kirim');
        const hasil = document.getElementById('hasil');
        btn.disabled = true; hasil.innerHTML = '<p class="redup">Mengunggah…</p>';
        try {
          const fd = new FormData(e.target);
          const r = await apiPostForm(`/api/tugas/${id}/kirim`, fd);
          hasil.innerHTML = `<div class="pesan sukses">Jawaban terkirim ✔ Nomor kiriman
            <b>#${r.kiriman_id}</b> (${r.n_kata} kata terbaca). Simpan nomor ini sebagai bukti.</div>`;
          e.target.reset();
        } catch (err) {
          hasil.innerHTML = `<div class="pesan gagal">Gagal: ${esc(err.message)}</div>`;
        } finally { btn.disabled = false; }
      };
    } catch (err) {
      isi.innerHTML = `<div class="pesan gagal">${esc(err.message)}</div>`;
    }
  </script>
</body>
</html>
